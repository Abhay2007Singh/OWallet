# =============================================================================
# Alembic configuration file
# Used by: alembic upgrade head, alembic revision --autogenerate, etc.
# =============================================================================

[alembic]
# Path to the migration scripts directory
script_location = migrations

# Template for generating migration file names.
# %(year)d%(month).2d%(day).2d_%(hour).2d%(minute).2d%(second).2d → timestamp prefix
# %(rev)s → short revision hash
# %(slug)s → slug from the -m message
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with this path so Python can find the app package.
# '.' means the project root (where alembic.ini lives).
prepend_sys_path = .

# Timezone for file names
timezone = UTC

# Truncate the slug (message) to this many characters
truncate_slug_length = 40

# -----------------------------------------------------------------------------
# DATABASE URL is NOT hardcoded here — env.py reads it from the Settings object.
# Hardcoding it would mean the URL is committed to git. We leave it blank.
# -----------------------------------------------------------------------------
sqlalchemy.url =

# -----------------------------------------------------------------------------
# Logging configuration
# Alembic uses Python's standard logging module.
# -----------------------------------------------------------------------------
[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

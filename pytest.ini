[pytest]
# =============================================================================
# pytest configuration for PyWallet
# =============================================================================

# asyncio_mode = auto:
#   Every async test function is automatically treated as an asyncio coroutine.
#   No need to add @pytest.mark.asyncio to each test.
#   This works with pytest-asyncio >= 0.21.
asyncio_mode = auto

# Where to look for tests
testpaths = tests

# Default options for every run
addopts =
    -v
    --tb=short
    --strict-markers

# Register custom markers so pytest doesn't warn about unknown ones
markers =
    integration: marks tests as integration tests (requires live DB + Redis)
    unit: marks tests as unit tests (no external services required)
    slow: marks tests that are intentionally slow (concurrency tests)

# Coverage output (when pytest-cov is installed and --cov flag is passed)
# Run with: pytest --cov=app --cov-report=term-missing
